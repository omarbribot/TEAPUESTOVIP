<style>
    :root {
        --bg-body: #020d1a;
        --bg-card: #1e293b;
        --text-main: #f8fafc;
        --text-muted: #cbd5e1;
        --accent-primary: #38bdf8;
        --border-color: #475569;
    }
    .card-recarga {
        background-color: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        color: var(--text-main);
    }
    .form-label { color: var(--text-muted) !important; font-weight: 600; }
    .form-control {
        background-color: #0f172a !important;
        border-color: var(--border-color) !important;
        color: #ffffff !important;
    }
    .volver-link {
        color: var(--accent-primary) !important;
        text-decoration: none;
        font-weight: 500;
    }
</style>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <a href="{{ url_for('home') }}" class="volver-link">
            <i class="fas fa-arrow-left me-1"></i> Volver al Inicio
        </a>
        <span class="badge rounded-pill bg-dark border border-secondary text-muted px-3 py-2">
            <i class="fas fa-bolt me-1 text-warning"></i> Modo Test
        </span>
    </div>

    <div class="card-recarga shadow-lg p-4 mx-auto" style="max-width: 500px;">
        <h3 class="text-center mb-4">
            <i class="fas fa-university me-2 text-info"></i>Simulador de Pago Móvil
        </h3>
        <p class="text-muted text-center small mb-4">Usa este formulario para simular una recarga automática en el sistema.</p>
        
        <div class="mb-3">
            <label class="form-label">ID de Usuario</label>
            <input type="number" id="test_user_id" class="form-control" value="{{ current_user.id }}" readonly>
        </div>
        <div class="mb-3">
            <label class="form-label">Monto a Recargar ($)</label>
            <input type="number" id="test_monto" class="form-control" placeholder="Ej: 100.00">
        </div>
        <div class="mb-3">
            <label class="form-label">Número de Referencia</label>
            <input type="text" id="test_ref" class="form-control" placeholder="PAGOMOVIL-12345" value="TEST-REF-{{ range(1, 99999) | random }}">
        </div>
        <!-- NUEVO: Campo de Selección de Fecha para Auditorías de Prueba -->
        <div class="mb-3">
            <label class="form-label">Fecha de la Transacción</label>
            <input type="date" id="test_fecha" class="form-control">
        </div>
        
        <button onclick="simularPago()" class="btn btn-primary w-100 py-3 mt-3 fw-bold">
            <i class="fas fa-bolt me-2"></i> EJECUTAR RECARGA AHORA
        </button>
    </div>
</div>

<script>
// Al cargar el documento, seteamos la fecha actual en formato YYYY-MM-DD
document.addEventListener("DOMContentLoaded", function() {
    const campoFecha = document.getElementById('test_fecha');
    const hoy = new Date();
    
    const año = hoy.getFullYear();
    // Corregimos el padding del mes de forma limpia
    const mes = String(hoy.getMonth() + 1).padStart(2, '0');
    const dia = String(hoy.getDate()).padStart(2, '0');
    
    // El input tipo date requiere estrictamente el orden AÑO-MES-DÍA internamente para pintar la interfaz
    campoFecha.value = `${año}-${mes}-${dia}`;
});

function simularPago() {
    const monto = document.getElementById('test_monto').value;
    if(!monto || monto <= 0) {
        alert("⚠️ Por favor ingresa un monto válido");
        return;
    }

    // Convertimos la fecha del input (YYYY-MM-DD) al formato DD/MM/YYYY que usa tu base de datos
    const fechaInput = document.getElementById('test_fecha').value;
    let fechaFormateada = null;
    if (fechaInput) {
        const partes = fechaInput.split('-');
        fechaFormateada = `${partes[2]}/${partes[1]}/${partes[0]}`; // DD/MM/YYYY
    }

    const data = {
        user_id: document.getElementById('test_user_id').value,
        monto: monto,
        referencia: document.getElementById('test_ref').value,
        token: "VIP_TOKEN_2026_TEST",
        fecha_personalizada: fechaFormateada // Se envía al webhook
    };

    fetch('/webhook/pagos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        if(result.status === 'success') {
            alert("✅ ¡Pago Exitoso! Tu saldo se ha actualizado.");
            location.href = "{{ url_for('home') }}";
        } else {
            alert("❌ Error: " + result.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert("❌ Error de conexión al procesar el pago");
    });
}
</script>
