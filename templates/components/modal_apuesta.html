<!-- ==========================================================================
   📂 templates/components/modal_apuesta.html - Modal para Confirmar Jugadas
   ========================================================================== -->
<div class="modal fade" id="modalApuesta" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">Apostar al <span id="modal-numero"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-center fw-bold text-uppercase" id="modal-nombre"></p>
                <form id="formApuestaAnimal">
                    <div class="mb-3">
                        <label class="form-label">Monto a apostar ($):</label>
                        <input type="number" id="monto_animal" class="form-control" placeholder="0.00" step="0.5" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sorteo disponible:</label>
                        <select id="sorteo_id" class="form-select">
                            {% for s in sorteos if s.estado == 'PROGRAMADO' %}
                            <option value="{{ s.id }}">{{ s.horario.strftime('%H:%M') }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Confirmar Jugada</button>
                </form>
            </div>
        </div>
    </div>
</div>
